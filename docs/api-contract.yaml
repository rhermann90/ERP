          description: DOCUMENT_NOT_FOUND | DUNNING_EMAIL_TEMPLATE_NOT_FOUND | DUNNING_EMAIL_STAGE_CONFIG_NOT_FOUND
        '502':
          description: DUNNING_EMAIL_SMTP_ERROR
        '503':
          description: DUNNING_EMAIL_SMTP_NOT_CONFIGURED
        '403':
          description: AUTH_ROLE_FORBIDDEN | TENANT_SCOPE_VIOLATION
        '401':
          description: UNAUTHORIZED
