        reason:
          type: string
          minLength: 5
          maxLength: 500
    DunningEmailFooterReadData:
      type: object
      required:
        - footerSource
        - tenantId
        - companyLegalName
        - streetLine
        - postalCode
        - city
        - countryCode
        - publicEmail
        - publicPhone
        - legalRepresentative
        - registerCourt
        - registerNumber
        - vatId
        - signatureLine
        - readyForEmailFooter
        - missingMandatoryFields
        - impressumComplianceTier
        - impressumGaps
      properties:
        footerSource:
          type: string
          enum: [NOT_CONFIGURED, TENANT_DATABASE]
        tenantId:
          type: string
          format: uuid
        companyLegalName:
          type: string
          maxLength: 300
        streetLine:
          type: string
          maxLength: 300
        postalCode:
          type: string
          maxLength: 20
        city:
          type: string
          maxLength: 120
        countryCode:
          type: string
          minLength: 2
          maxLength: 2
        publicEmail:
          type: string
          maxLength: 320
        publicPhone:
          type: string
          maxLength: 80
        legalRepresentative:
          type: string
          maxLength: 300
        registerCourt:
          type: string
          maxLength: 200
        registerNumber:
          type: string
          maxLength: 120
        vatId:
          type: string
          maxLength: 32
        signatureLine:
          type: string
          maxLength: 200
        readyForEmailFooter:
          type: boolean
        missingMandatoryFields:
          type: array
          items:
            type: string
        impressumComplianceTier:
          type: string
          enum: [MINIMAL, EXTENDED]
          description: >
            Heuristisches Signal zu erweiterter Befüllung (Vertretung, Register-Paar, DE-USt-Id);
            EXTENDED nur wenn readyForEmailFooter und keine Gap-Codes. Kein Ersatz für rechtsform-spezifische Pflichtprüfung.
        impressumGaps:
          type: array
          items:
            type: string
            enum:
              - REGISTER_PAIR_INCOMPLETE
              - LEGAL_REPRESENTATIVE_MISSING
              - VAT_ID_MISSING
              - VAT_ID_FORMAT_INVALID
          description: >
            Stabile Hinweis-Codes (keine Lokalisierung). REGISTER_PAIR_INCOMPLETE wenn nur Gericht oder nur Nummer gesetzt;
            DE-Mandanten USt-Id grob DE+9 Ziffern.
    DunningTenantAutomationReadData:
      type: object
      required:
        - automationSource
        - tenantId
        - runMode
        - jobHourUtc
        - ianaTimezone
        - federalStateCode
        - paymentTermDayKind
        - preferredDunningChannel
      properties:
        automationSource:
          type: string
          enum: [NOT_CONFIGURED, TENANT_DATABASE]
        tenantId:
          type: string
          format: uuid
        runMode:
          type: string
          enum: [OFF, SEMI]
          description: Ohne gespeicherte Zeile liefert GET effektiv SEMI (Quelle NOT_CONFIGURED).
        jobHourUtc:
          type: integer
          nullable: true
          description: Historisch; immer null (kein Cron).
        ianaTimezone:
          type: string
          maxLength: 64
          description: IANA-Zeitzone für „heute“ bei Mahn-Kandidaten (Default Europe/Berlin).
        federalStateCode:
          type: string
          nullable: true
          maxLength: 4
          description: DE-Bundeslandcode für Feiertags-Werktage (z. B. BY, BW); null = nur bundesweite Feiertage.
        paymentTermDayKind:
          type: string
          enum: [CALENDAR, BUSINESS]
          description: Interpretation von daysAfterDue je Stufe gegenüber Rechnungsdatum (Kalender- vs. Werktage).
        preferredDunningChannel:
          type: string
          enum: [EMAIL, PRINT]
          description: Mandanten-Vorgabe Kanal (SEMI; technische Umsetzung Druck folgt Inkrementen).
    DunningTenantAutomationReadResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/DunningTenantAutomationReadData'
    PatchDunningTenantAutomationRequest:
