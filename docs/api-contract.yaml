        preferredDunningChannel:
          type: string
          enum: [EMAIL, PRINT]
    DunningEmailFooterReadResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/DunningEmailFooterReadData'
    PatchDunningEmailFooterRequest:
      type: object
      required: [reason]
      properties:
        reason:
          type: string
          minLength: 5
          maxLength: 500
        companyLegalName:
          type: string
          maxLength: 300
        streetLine:
          type: string
          maxLength: 300
        postalCode:
          type: string
          maxLength: 20
        city:
          type: string
          maxLength: 120
        countryCode:
          type: string
          minLength: 2
          maxLength: 2
        publicEmail:
          type: string
          maxLength: 320
        publicPhone:
          type: string
          maxLength: 80
        legalRepresentative:
          type: string
          maxLength: 300
        registerCourt:
          type: string
          maxLength: 200
        registerNumber:
          type: string
          maxLength: 120
        vatId:
          type: string
          maxLength: 32
        signatureLine:
          type: string
          maxLength: 200
