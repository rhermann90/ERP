        items:
          type: array
          minItems: 1
          maxItems: 25
          items:
            $ref: '#/components/schemas/DunningReminderBatchEmailItem'
    DunningReminderBatchEmailRowResult:
      type: object
      required: [invoiceId, toEmail, outcome]
      properties:
        invoiceId:
          type: string
          format: uuid
        toEmail:
