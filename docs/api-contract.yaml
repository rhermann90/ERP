    LoginRequest:
      type: object
      required: [tenantId, email, password]
      properties:
        tenantId:
          type: string
          format: uuid
          description: Mandanten-ID — Login nur für Benutzer dieses Tenants (strict tenant scope).
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 1
          maxLength: 2000
    LoginResponse:
      type: object
      required: [accessToken, tokenType, expiresIn, tenantId, userId, role]
      properties:
        accessToken:
          type: string
          description: Signiertes v1-Token (unmittelbar als Bearer-Authorization nutzbar).
        tokenType:
          type: string
          enum: [Bearer]
        expiresIn:
          type: integer
          minimum: 1
          description: Restliche Gültigkeit in Sekunden ab Ausstellung.
        tenantId:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        role:
          type: string
          enum: [ADMIN, BUCHHALTUNG, GESCHAEFTSFUEHRUNG, VERTRIEB_BAULEITUNG, VIEWER]
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [ok]
    ReadinessOk:
      type: object
      required: [status, checks]
      properties:
        status:
          type: string
          enum: [ready]
        checks:
          type: object
          required: [database]
          properties:
            database:
              type: string
              enum: [ok, not_configured]
    ReadinessFailed:
      type: object
      required: [status, checks]
      properties:
        status:
          type: string
          enum: [not_ready]
        checks:
          type: object
          required: [database]
          properties:
            database:
              type: string
              enum: [error]
paths:
  /health:
    get:
      summary: Liveness (tenant-neutral, ohne Auth)
      description: Minimaler Endpunkt für Load-Balancer/Orchestrierung; keine Mandantendaten.
      responses:
        '200':
          description: Prozess antwortet
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'
  /ready:
    get:
      summary: Readiness (tenant-neutral, ohne Auth)
      description: |
        Prüft optional die Postgres-Verbindung, wenn `repositoryMode=postgres` (Prisma).
        Im In-Memory-Modus ist `checks.database` immer `not_configured` — trotzdem HTTP 200 (Prozess bereit).
        Bei nicht erreichbarer DB im Postgres-Modus **503** mit `not_ready`.
      responses:
        '200':
          description: Bereit (DB ok oder nicht konfiguriert)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadinessOk'
        '503':
          description: Postgres-Modus, DB nicht erreichbar
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadinessFailed'
  /auth/login:
    post:
      tags: [Auth]
      operationId: authPasswordLogin
      summary: Passwort-Anmeldung (MVP / Demo-Betrieb)
      description: |
        Prüft **Mandant + E-Mail + Passwort**. Mit Postgres: Benutzer aus Tabelle `users` (Multi-User pro Mandant).
        Ohne Postgres (In-Memory-Modus): optional `ERP_LOGIN_*` siehe `docs/authentication-login.md`.
        Kein OAuth2. Fehlversuche: einheitliche `401` / `UNAUTHORIZED` ohne Enumeration.
        Brute-Force-Schutz: IP-basiertes Fenster (siehe Doku).
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Ausgestelltes Session-Token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          description: VALIDATION_FAILED (Zod)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: UNAUTHORIZED (falsche Zugangsdaten oder Login deaktiviert)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          description: AUTH_RATE_LIMITED
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /auth/request-password-reset:
    post:
      tags: [Auth]
      operationId: authRequestPasswordReset
      summary: Passwort-Reset anfordern (E-Mail mit Link)
      description: |
        Öffentlich, ohne Bearer. Mit Postgres; erzeugt Challenge und sendet E-Mail (Dev/Test ohne SMTP ggf. Konsolen-Fallback).
        In **production** ohne SMTP oder ohne `ERP_PUBLIC_APP_BASE_URL`: **503** / `PASSWORD_RESET_MAIL_NOT_CONFIGURED` vor Benutzer-Lookup.
        Antwort-Text bleibt generisch (keine Enumeration existierender Konten).
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RequestPasswordResetRequest'
      responses:
        '200':
          description: Anfrage entgegengenommen
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestPasswordResetResponse'
        '400':
          description: VALIDATION_FAILED
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          description: AUTH_RATE_LIMITED
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '503':
          description: USER_MANAGEMENT_REQUIRES_DB | PASSWORD_RESET_MAIL_NOT_CONFIGURED
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
