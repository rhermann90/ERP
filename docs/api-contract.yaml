openapi: 3.0.3
info:
  title: ERP Backend API (Phase 1 + Phase 2 Inc1 + Inc2 LV §9 + FIN-1/2/3/4 Finance)
  version: 1.26.0-fin4-batch-dunning-email-5c
  description: |
    **PWA / Browser-Anbindung**
    - **CORS**: Umgebungsvariable `CORS_ORIGINS` — kommagetrennte, exakte Origins (z. B. `https://app.example.com,http://localhost:5173`). Leer oder unset: keine `Access-Control-*`-Header (gleiche Origin oder Server-zu-Server).
    - **Auth**: `Authorization: Bearer <signed-v1-token>` (siehe `bearerToken`); optionaler Header `X-Tenant-Id` muss zum Tenant im Token passen, sonst `TENANT_SCOPE_VIOLATION`. **Passwort-Login:** `POST /auth/login` mit JSON `{ tenantId, email, password }` — siehe `docs/authentication-login.md`. **Passwort vergessen (öffentlich):** `POST /auth/request-password-reset`, `POST /auth/confirm-password-reset` — nur mit Postgres; Link `#/password-reset?token=…` (Basis `ERP_PUBLIC_APP_BASE_URL`); Produktion: SMTP + Basis-URL Pflicht. **Benutzerverwaltung:** `GET|POST /users`, `PATCH /users/{userId}` inkl. optional **E-Mail** (nur Rolle **ADMIN**, nur mit Postgres) — Audit-Ereignisse `USER` / `USER_CREATED` / `USER_UPDATED`. **Betrieb:** `AUTH_TOKEN_SECRET` (min. 32 Zeichen bei `NODE_ENV=production`); ohne Secret kein Start — siehe Repo-`.env.example`. Nur lokaler Demo-Modus: `ERP_ALLOW_INSECURE_DEV_AUTH=1` und nicht `production` (niemals deployen).
    - **Logs**: Strukturierte Fastify-Request-Logs enthalten keine `Authorization`- oder `Cookie`-Werte (`LOG_LEVEL`, `LOG_DISABLE=1` siehe Betrieb).
    - **Fehler**: Antwort-JSON gemäß Schema `Error` — Felder `code`, `message`, `correlationId`, `retryable`, `blocking`, optional `details` (Frontend-Passthrough laut `docs/contracts/decision-log-phase1-frontend.md`). **Header:** `x-correlation-id` und `x-request-id` sind gleich der Request-ID (`request.id`) und entsprechen `correlationId` im Body bei Fehlerantworten.
    - **FIN-4 / Integratoren:** Auf Pfaden unter **`/finance/dunning-reminder…`**, **`/finance/dunning-reminder-automation`** und **`/finance/dunning-email-footer`** sendet der Server zusätzlich **`x-erp-openapi-contract-version`** (Wert identisch zu `info.version` dieser Datei). Laufzeit-Abgleich und Breaking-Notes: `docs/contracts/FIN4-external-client-integration.md`. Browser-Cross-Origin: Header steht in `Access-Control-Expose-Headers`, wenn CORS aktiv ist (`CORS_ORIGINS`).
servers:
  - url: http://localhost:3000
tags:
  - name: Auth
    description: |
      Passwort-Anmeldung (`POST /auth/login`) und öffentlicher Passwort-Reset per E-Mail (`POST /auth/request-password-reset`, `POST /auth/confirm-password-reset`, nur Postgres).
      Ohne Postgres: In-Memory-Login optional über `ERP_LOGIN_*`; Reset-Endpunkte antworten mit `503` / `USER_MANAGEMENT_REQUIRES_DB`.
  - name: Users (Admin)
    description: |
      Mandanten-isolierte Benutzerverwaltung (Tabelle `users`). Schreibzugriff nur mit Rolle **ADMIN**; ohne Postgres antwortet die API mit `503` / `USER_MANAGEMENT_REQUIRES_DB`.
  - name: Finance (FIN-0)
    description: |
      Historisch: Contract-Stubs / Mapping-Dokument (`finance-fin0-openapi-mapping.md`). Produktiver Zahlungseingang: **Finance (FIN-3)**.
  - name: Finance (FIN-3)
    description: |
      Zahlungseingang (Spez 8.7): `POST /finance/payments/intake` mit Idempotenz `(tenant_id, idempotency_key)`, Persistenz und Rechnungsstatus **TEILBEZAHLT** / **BEZAHLT** (ADR-0007).
      Mapping: `docs/contracts/finance-fin0-openapi-mapping.md`.
  - name: Finance (FIN-4)
    description: |
      Mahnwesen (Spez 8.10): **Kern** — `GET|PUT /finance/dunning-reminder-config` und `PATCH|DELETE …/stages/{stageOrdinal}` (Lesen: MVP **oder** 9 **aktive** DB-Stufen; Schreiben: Postgres, Rollen wie Zahlungseingang); `GET /invoices/{invoiceId}/dunning-reminders` (Liste); `POST` Mahn-Ereignis; Tabellen `dunning_reminders`, `dunning_tenant_stage_config` — `docs/adr/0009-fin4-mahnwesen-slice.md`. **M4** — `GET /finance/dunning-reminder-templates` (Slice 1: MVP **oder** 18 aktive DB-Zeilen 9×2 Kanäle); **`PATCH …/templates/stages/{stageOrdinal}/channels/{channel}`** (Slice 2: `body` mit Pflichtplatzhaltern §8.10, Audit in DB-Tx); **`GET|PATCH /finance/dunning-email-footer`** (Slice 3: Impressum-Stammdaten); **`POST …/dunning-reminders/email-preview`** und **`POST …/send-email-stub`** (Slice 4: Plain-Text-Vorschau; Versand nur Audit, kein SMTP); **`POST …/dunning-reminders/send-email`** (Slice 5a: SMTP, Idempotenz); **`GET /finance/dunning-reminder-candidates`** (Slice **5b-0**: Lesepfad Mahnlauf-Kandidaten, keine Mutation); **`POST /finance/dunning-reminder-run`** (Slice **5b-1**: Mahnlauf `DRY_RUN`/`EXECUTE`, Idempotenz `dunning_reminder_run_intents`); **`GET|PATCH /finance/dunning-reminder-automation`** (Mandanten-Modus OFF/SEMI, SEMI-Kontext: Zeitzone, optional DE-Bundesland, Kalender-/Werktage-Frist, Kanal-Vorgabe); Tabellen `dunning_tenant_stage_templates`, `dunning_tenant_email_footer`, `dunning_email_sends`, `dunning_tenant_automation` — `docs/adr/0010-fin4-m4-dunning-email-and-templates.md`, `docs/adr/0011-fin4-semi-dunning-context.md`. SoT **`RECORD_DUNNING_REMINDER`** in `allowed-actions` für gebuchte/teilbezahlte Rechnung.
  - name: Finance (FIN-1)
    description: |
      Zahlungsbedingungen (Spez 8.5): Konditionskopf pro Projekt, append-only Versionen — `docs/adr/0008-payment-terms-fin1.md`.
  - name: Finance (FIN-2)
    description: |
      Rechnung Entwurf + Lesepfad (Spez 8.2, Traceability) — vertikaler Slice ohne vollständige 8.4-Berechnung; siehe ADR-0007.
components:
  securitySchemes:
    bearerToken:
      type: http
      scheme: bearer
      bearerFormat: signed-v1-token
  parameters:
    TenantScopeHeader:
      in: header
      name: x-tenant-id
      required: false
      schema:
        type: string
        format: uuid
      description: Optionaler Tenant-Scope, muss mit Token-Tenant identisch sein.
    IdempotencyKey:
      in: header
      name: Idempotency-Key
      required: true
      schema:
        type: string
        format: uuid
      description: |
        Pflicht für `POST /finance/payments/intake` (8.7), `POST /invoices/{invoiceId}/dunning-reminders/send-email` (M4 Slice 5a) und `POST /finance/dunning-reminder-run` mit `mode: EXECUTE` (M4 Slice 5b-1);
        technische Eindeutigkeit je Endpunkt (Zahlungseingang: `payment_intakes`; Mahn-E-Mail: `dunning_email_sends`; Mahnlauf: `dunning_reminder_run_intents`) gemäß ADR-0007 bzw. ADR-0010.
        Header wird **case-insensitive** gelesen; Wert muss **UUID** sein, sonst `400` / `VALIDATION_FAILED`.
  schemas:
    AllowedActionsResponse:
      type: object
      required: [documentId, entityType, allowedActions]
      properties:
        documentId:
          type: string
          format: uuid
        entityType:
          type: string
          enum: [OFFER_VERSION, SUPPLEMENT_VERSION, MEASUREMENT_VERSION, LV_VERSION, LV_STRUCTURE_NODE, LV_POSITION, INVOICE]
        allowedActions:
          type: array
          items:
            type: string
          description: |
            Backend Source-of-Truth. Für entityType=OFFER_VERSION und status=ANGENOMMEN können berechtigte Rollen
            (ADMIN, VERTRIEB_BAULEITUNG, GESCHAEFTSFUEHRUNG) die Aktion OFFER_CREATE_SUPPLEMENT erhalten (Mapping zu POST /offers/{offerId}/supplements).
            OFFER_CREATE_VERSION endet spätestens vor ANGENOMMEN/ABGELEHNT/ARCHIVIERT (Policy offer-create-version-policy).
            entityType=MEASUREMENT_VERSION: Aktionen gemäß §5.4 v1.2 (z. B. MEASUREMENT_CREATE_VERSION nur nach FREIGEGEBEN/ABGERECHNET;
            historische Versionen: leere allowedActions).
            entityType=LV_VERSION|LV_STRUCTURE_NODE|LV_POSITION: gemäß §9 v1.2 und ADR-0005 (Text/Struktur nur ENTWURF aktuelle Version).
            entityType=INVOICE: **BOOK_INVOICE** (ENTWURF, Rollen ADMIN|GESCHAEFTSFUEHRUNG|BUCHHALTUNG) → POST /invoices/{id}/book; kanonische Export-Aktion **EXPORT_INVOICE** (Format `XRECHNUNG` nur im Body von POST /exports); **RECORD_PAYMENT_INTAKE** nur GEBUCHT_VERSENDET|TEILBEZAHLT; **RECORD_DUNNING_REMINDER** dieselben Status/Rollen → POST /invoices/{id}/dunning-reminders; kein separates actionId-Suffix pro Exportformat.
    MeasurementPosition:
      type: object
      required: [lvPositionId, quantity, unit]
      properties:
        lvPositionId:
          type: string
          format: uuid
        quantity:
          type: number
          exclusiveMinimum: 0
        unit:
          type: string
          maxLength: 32
        note:
          type: string
          maxLength: 500
    CreateMeasurementRequest:
      type: object
      required: [projectId, customerId, lvVersionId, positions, reason]
      properties:
        projectId:
          type: string
          format: uuid
        customerId:
          type: string
          format: uuid
        lvVersionId:
          type: string
          format: uuid
        positions:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/MeasurementPosition'
        reason:
          type: string
          minLength: 5
    TransitionMeasurementStatusRequest:
      type: object
      required: [measurementVersionId, nextStatus, reason]
      properties:
        measurementVersionId:
          type: string
          format: uuid
        nextStatus:
          type: string
          enum: [GEPRUEFT, FREIGEGEBEN, ABGERECHNET, ARCHIVIERT]
        reason:
          type: string
          minLength: 5
    CreateMeasurementVersionRequest:
      type: object
      required: [measurementId, reason]
      properties:
        measurementId:
          type: string
          format: uuid
        reason:
          type: string
          minLength: 5
    UpdateMeasurementPositionsRequest:
      type: object
      required: [positions, reason]
      properties:
        positions:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/MeasurementPosition'
        reason:
          type: string
          minLength: 5
    CreateLvCatalogRequest:
      type: object
      required: [name, headerSystemText, headerEditingText, reason]
      properties:
        name:
          type: string
          maxLength: 200
        headerSystemText:
          type: string
        headerEditingText:
          type: string
        projectId:
          type: string
          format: uuid
        reason:
          type: string
          minLength: 5
    CreateLvCatalogVersionRequest:
      type: object
      required: [reason]
      properties:
        reason:
          type: string
          minLength: 5
    TransitionLvVersionRequest:
      type: object
      required: [nextStatus, reason]
      properties:
        nextStatus:
          type: string
          enum: [FREIGEGEBEN, ARCHIVIERT]
        reason:
          type: string
          minLength: 5
    AddLvStructureNodeRequest:
      type: object
      required: [kind, sortOrdinal, systemText, editingText, reason]
      properties:
        parentNodeId:
          type: string
          format: uuid
          nullable: true
        kind:
          type: string
          enum: [BEREICH, TITEL, UNTERTITEL]
        sortOrdinal:
          type: string
        systemText:
          type: string
        editingText:
          type: string
        reason:
          type: string
          minLength: 5
    UpdateLvNodeEditingRequest:
      type: object
      required: [editingText, reason]
      properties:
        editingText:
          type: string
        reason:
          type: string
          minLength: 5
    AddLvPositionRequest:
      type: object
      required: [parentNodeId, sortOrdinal, quantity, unit, unitPriceCents, kind, systemText, editingText, reason]
      properties:
        parentNodeId:
          type: string
          format: uuid
        sortOrdinal:
          type: string
        quantity:
          type: number
        unit:
          type: string
        unitPriceCents:
          type: integer
        kind:
          type: string
          enum: [NORMAL, ALTERNATIV, EVENTUAL]
        systemText:
          type: string
        editingText:
          type: string
        stammPositionsRef:
          type: string
          format: uuid
        reason:
          type: string
          minLength: 5
    PatchLvPositionRequest:
      type: object
      required: [reason]
      properties:
        editingText:
          type: string
        quantity:
          type: number
        unit:
          type: string
        unitPriceCents:
          type: integer
        sortOrdinal:
          type: string
        reason:
          type: string
          minLength: 5
    CreatePaymentTermsVersionRequest:
      type: object
      description: |
        Platzhalter FIN-1 — Zahlungsbedingungs-Version (v1.3 **8.5**). Felder können im FIN-2-Kick-off verfeinert werden;
        **kein** `default` für Geldbeträge oder Währung (8.12 / 8.16).
      required: [projectId, customerId, reason, termsLabel]
      properties:
        projectId:
          type: string
          format: uuid
        customerId:
          type: string
          format: uuid
        termsLabel:
          type: string
          maxLength: 200
          description: Mandantensichtbare Bezeichnung der Konditionsversion (kein Freitext-Skript).
        reason:
          type: string
          minLength: 5
    PaymentTermsListResponse:
      type: object
      description: Konditionskopf eines Projekts mit allen Versionen (aufsteigend nach versionNumber).
      required:
        [paymentTermsHeadId, projectId, customerId, createdAt, createdBy, versions]
      properties:
        paymentTermsHeadId:
          type: string
          format: uuid
        projectId:
          type: string
          format: uuid
        customerId:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        createdBy:
          type: string
          format: uuid
        versions:
          type: array
          items:
            type: object
            required: [paymentTermsVersionId, versionNumber, termsLabel, createdAt, createdBy]
            properties:
              paymentTermsVersionId:
                type: string
                format: uuid
              versionNumber:
                type: integer
                minimum: 1
              termsLabel:
                type: string
              createdAt:
                type: string
                format: date-time
              createdBy:
                type: string
                format: uuid
    CreateInvoiceDraftRequest:
      type: object
      description: |
        FIN-2 — Rechnung als Entwurf (**8.2**). `lvVersionId` verbindliche Bezugsgröße für **8.4 Schritt 1** (FIN-2-Start-Gate **G5**).
        `invoiceCurrencyCode` explizit required; v1.3 buchführungsrelevant nur **EUR** — **ohne** OpenAPI-Default.
        Optional `paymentTermsVersionId` muss zum Projekt des Angebots passen (FIN-1).
        Optional `skontoBps` (0–10_000): **8.4(2)** Skonto aliquot auf LV-Netto nach Schritt 1 (B2-1a); USt/Brutto auf reduziertes Netto.
      required: [lvVersionId, offerVersionId, invoiceCurrencyCode, reason]
      properties:
        lvVersionId:
          type: string
          format: uuid
        offerVersionId:
          type: string
          format: uuid
        invoiceCurrencyCode:
          type: string
          enum: [EUR]
        paymentTermsVersionId:
          type: string
          format: uuid
          description: Optional; wenn gesetzt, muss die Version zum Projekt der Angebotsversion gehören.
        skontoBps:
          type: integer
          minimum: 0
          maximum: 10000
          description: Skonto in Basispunkten; 0 = kein Abzug. 10000 würde das gesamte Netto tilgen und wird serverseitig abgelehnt, wenn kein positives Netto übrig bleibt.
        reason:
          type: string
          minLength: 5
    CreateInvoiceDraftResponse:
      type: object
      required: [invoiceId, lvNetCents, vatRateBps, vatCents, totalGrossCents, skontoBps]
      properties:
        invoiceId:
          type: string
          format: uuid
        lvNetCents:
          type: integer
        vatRateBps:
          type: integer
        vatCents:
          type: integer
        totalGrossCents:
          type: integer
        skontoBps:
          type: integer
          minimum: 0
          maximum: 10000
    BookInvoiceRequest:
      type: object
      description: |
        FIN-2 — Rechnung aus **ENTWURF** buchen (**8.2** / gebucht unveränderlich ab `GEBUCHT_VERSENDET`).
        `issueDate` optional; Standard ist UTC-Datum `yyyy-mm-dd` am Buchungstag.
      required: [reason]
      properties:
        reason:
          type: string
          minLength: 5
        issueDate:
          type: string
          format: date
          description: ISO-Datum Buchungs-/Ausstellungsdatum; wenn fehlt, setzt der Server UTC heute.
    BookInvoiceResponse:
      type: object
      required: [invoiceId, status, invoiceNumber, issueDate, totalGrossCents]
      properties:
        invoiceId:
          type: string
          format: uuid
        status:
          type: string
          enum: [GEBUCHT_VERSENDET]
        invoiceNumber:
          type: string
        issueDate:
          type: string
          format: date
        totalGrossCents:
          type: integer
    InvoiceGetResponse:
      type: object
      required:
        [invoiceId, projectId, customerId, measurementId, lvVersionId, offerId, status]
      properties:
        invoiceId:
          type: string
          format: uuid
        projectId:
          type: string
          format: uuid
        customerId:
          type: string
          format: uuid
        measurementId:
          type: string
          format: uuid
        lvVersionId:
          type: string
          format: uuid
        offerId:
          type: string
          format: uuid
        offerVersionId:
          type: string
          format: uuid
        status:
          type: string
          enum:
            [
              ENTWURF,
              GEPRUEFT,
              FREIGEGEBEN,
              GEBUCHT_VERSENDET,
              BEZAHLT,
              TEILBEZAHLT,
              STORNIERT,
            ]
        invoiceNumber:
          type: string
        issueDate:
          type: string
          format: date
        totalGrossCents:
          type: integer
        lvNetCents:
          type: integer
          description: Netto nach 8.4 bis Schritt 6 (inkl. B2-1a-Skonto auf Schritt-1-Netto).
        vatCents:
          type: integer
        vatRateBps:
          type: integer
          description: Regel-USt-Satz in Basispunkten (MVP 19 % = 1900).
        totalPaidCents:
          type: integer
        paymentTermsVersionId:
          type: string
          format: uuid
        skontoBps:
          type: integer
          minimum: 0
          maximum: 10000
          description: Persistierter Skonto-Anteil aus Entwurfserzeugung (B2-1a).
    PaymentIntakeRequest:
      type: object
      description: Zahlungseingang **8.7** — nur bei gebuchter/versendeter oder teilbezahlter Rechnung mit 8.4-Beträgen.
      required: [invoiceId, amountCents, externalReference, reason]
      properties:
        invoiceId:
          type: string
          format: uuid
        amountCents:
          type: integer
          description: Geldbetrag in Cent; Summe der Zahlungen je Rechnung darf `totalGrossCents` nicht übersteigen; Rundungslogik **8.12** serverseitig nach ADR-0007.
          minimum: 1
        externalReference:
          type: string
          maxLength: 200
          description: Externer Bank-/PSP-Referenztext (persistiert mit `payment_intakes`).
        reason:
          type: string
          minLength: 5
    PaymentIntakeResponse:
      type: object
      description: Erfolgskörper ohne internes `replay`-Flag; HTTP **201** bei neuer Zahlung, **200** bei idempotentem Replay (gleicher Key und gleicher fachlicher Inhalt).
      required:
        [paymentIntakeId, invoiceId, amountCents, totalPaidCentsAfter, invoiceOpenCentsAfter, invoiceStatus]
      properties:
        paymentIntakeId:
          type: string
          format: uuid
        invoiceId:
          type: string
          format: uuid
        amountCents:
          type: integer
        totalPaidCentsAfter:
          type: integer
          description: Summe aller Zahlungseingänge für die Rechnung nach dieser Operation.
        invoiceOpenCentsAfter:
          type: integer
          minimum: 0
          description: Differenz Brutto minus Summe Zahlungen (nicht negativ).
        invoiceStatus:
          type: string
          enum: [GEBUCHT_VERSENDET, TEILBEZAHLT, BEZAHLT]
    PaymentIntakeReadRow:
      type: object
      description: |
        DSGVO-minimierter Lesepfad je Zahlungseingang — **ohne** technischen `Idempotency-Key` (nur serverintern / Retry).
      required: [paymentIntakeId, amountCents, externalReference, createdAt]
      properties:
        paymentIntakeId:
          type: string
          format: uuid
        amountCents:
          type: integer
        externalReference:
          type: string
        createdAt:
          type: string
          format: date-time
    PaymentIntakeListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/PaymentIntakeReadRow'
    DunningReminderReadRow:
      type: object
      required: [dunningReminderId, stageOrdinal, createdAt]
      properties:
        dunningReminderId:
          type: string
          format: uuid
        stageOrdinal:
          type: integer
        note:
          type: string
          maxLength: 500
        createdAt:
          type: string
          format: date-time
    DunningReminderListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/DunningReminderReadRow'
    CreateDunningReminderRequest:
      type: object
      required: [stageOrdinal, reason]
      properties:
        stageOrdinal:
          type: integer
          minimum: 1
          maximum: 9
          description: Mahnstufe / Ordinal (MVP ohne Konfigurationstabelle).
        note:
          type: string
          maxLength: 500
        reason:
          type: string
          minLength: 5
          description: Grund für Audit (SoT-Schreibpfad).
    CreateDunningReminderResponse:
      type: object
      required: [dunningReminderId, stageOrdinal, createdAt]
      properties:
        dunningReminderId:
          type: string
          format: uuid
        stageOrdinal:
          type: integer
        createdAt:
          type: string
          format: date-time
    DunningReminderEmailPreviewRequest:
      type: object
      required: [stageOrdinal, reason]
      properties:
        stageOrdinal:
          type: integer
          minimum: 1
          maximum: 9
        reason:
          type: string
          minLength: 5
          maxLength: 500
    DunningReminderEmailPreviewData:
      type: object
      required:
        - stageOrdinal
        - templateBodyRaw
        - templateBodyWithPlaceholders
        - footerPlainText
        - fullPlainText
        - readyForEmailFooter
        - missingMandatoryFields
        - impressumComplianceTier
        - impressumGaps
        - warnings
      properties:
        stageOrdinal:
          type: integer
        templateBodyRaw:
          type: string
        templateBodyWithPlaceholders:
          type: string
        footerPlainText:
          type: string
        fullPlainText:
          type: string
        readyForEmailFooter:
          type: boolean
        missingMandatoryFields:
          type: array
          items:
            type: string
        impressumComplianceTier:
          type: string
          enum: [MINIMAL, EXTENDED]
        impressumGaps:
          type: array
          items:
            type: string
        warnings:
          type: array
          items:
            type: string
    DunningReminderEmailPreviewResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/DunningReminderEmailPreviewData'
    DunningReminderEmailSendStubData:
      type: object
      required: [outcome, stageOrdinal, auditEventId, message]
      properties:
        outcome:
          type: string
          enum: [NOT_SENT_NO_SMTP]
        stageOrdinal:
          type: integer
        auditEventId:
          type: string
          format: uuid
        message:
          type: string
    DunningReminderEmailSendStubResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/DunningReminderEmailSendStubData'
    DunningReminderEmailSendRequest:
      type: object
      required: [stageOrdinal, reason, toEmail]
      properties:
        stageOrdinal:
          type: integer
          minimum: 1
          maximum: 9
        reason:
          type: string
          minLength: 5
          maxLength: 500
        toEmail:
          type: string
          format: email
          maxLength: 320
    DunningReminderEmailSendData:
      type: object
      required: [outcome, stageOrdinal, auditEventId, recipientEmail, message]
      properties:
        outcome:
          type: string
          enum: [SENT, REPLAY]
        stageOrdinal:
          type: integer
        auditEventId:
          type: string
          format: uuid
        smtpMessageId:
          type: string
          description: Optional; fehlt bei REPLAY wenn historisch nicht gespeichert.
        recipientEmail:
          type: string
          format: email
        message:
          type: string
    DunningReminderEmailSendResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/DunningReminderEmailSendData'
    DunningStageConfigReadRow:
      type: object
      required: [stageOrdinal, daysAfterDue, feeCents, label]
      description: Mahnstufe (MVP-Default oder aus `dunning_tenant_stage_config`).
      properties:
        stageOrdinal:
          type: integer
          minimum: 1
          maximum: 9
        daysAfterDue:
          type: integer
          minimum: 0
          description: Tage nach Fälligkeit bis zur nächsten Eskalation (MVP-Illustration).
        feeCents:
          type: integer
          minimum: 0
        label:
          type: string
    DunningReminderConfigReadData:
      type: object
      required: [configSource, tenantId, stages]
      properties:
        configSource:
          type: string
          enum: [MVP_STATIC_DEFAULTS, TENANT_DATABASE]
          description: |
            `TENANT_DATABASE` nur wenn für den Mandanten **9** Zeilen mit Ordinal **1–9** existieren; sonst `MVP_STATIC_DEFAULTS`.
        tenantId:
          type: string
          format: uuid
        stages:
          type: array
          items:
            $ref: '#/components/schemas/DunningStageConfigReadRow'
    DunningReminderConfigReadResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/DunningReminderConfigReadData'

    DunningTemplateChannelRow:
      type: object
      required: [channel, templateType, body]
      description: Mahn-Vorlage je Kanal (E-Mail oder Druck/PDF); §8.10 Platzhalter im Freitext (Slice 1 ohne serverseitige Validierung).
      properties:
        channel:
          type: string
          enum: [EMAIL, PRINT]
        templateType:
          type: string
          enum: [REMINDER, DEMAND_NOTE, DUNNING]
          description: Zahlungserinnerung / Zahlungsavis / Mahnung — genau ein Typ pro Stufe (MVP-Zuordnung).
        body:
          type: string
    DunningStageTemplatesReadRow:
      type: object
      required: [stageOrdinal, channels]
      properties:
        stageOrdinal:
          type: integer
          minimum: 1
          maximum: 9
        channels:
          type: array
          items:
            $ref: '#/components/schemas/DunningTemplateChannelRow'
    DunningReminderTemplatesReadData:
      type: object
      required: [templateSource, tenantId, stages]
      properties:
        templateSource:
          type: string
          enum: [MVP_STATIC_DEFAULTS, TENANT_DATABASE]
          description: |
            `TENANT_DATABASE` nur wenn **18** aktive Zeilen (Ordinal 1–9 × Kanal EMAIL und PRINT, `deleted_at IS NULL`); sonst MVP-Defaults.
        tenantId:
          type: string
          format: uuid
        stages:
          type: array
          items:
            $ref: '#/components/schemas/DunningStageTemplatesReadRow'
    DunningReminderTemplatesReadResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/DunningReminderTemplatesReadData'
    DunningCandidatesEligibilityContextRead:
      type: object
      required: [ianaTimezone, federalStateCode, paymentTermDayKind, preferredDunningChannel]
      properties:
        ianaTimezone:
          type: string
          description: IANA-Zeitzone für „heute“ und `asOfDate` (ADR-0011).
        federalStateCode:
          type: string
          nullable: true
          description: DE-Ländercode (ISO 3166-2:DE) für Feiertags-Werktage; null wenn nicht gesetzt.
        paymentTermDayKind:
          type: string
          enum: [CALENDAR, BUSINESS]
        preferredDunningChannel:
          type: string
          enum: [EMAIL, PRINT]
    DunningReminderCandidateRow:
      type: object
      required: [invoiceId, dueDate, stageDeadlineIso, openAmountCents]
      properties:
        invoiceId:
          type: string
          format: uuid
        dueDate:
          type: string
          format: date
          description: |
            MVP 5b-0: Fälligkeitsanker entspricht `issueDate` (Rechnungsdatum), bis ein separates `dueDate` im Modell existiert (ADR-0010).
        stageDeadlineIso:
          type: string
          format: date
          description: |
            Berechnetes Ende der Frist für diese Stufe (`issueDate` + `daysAfterDue` gemäß `paymentTermDayKind` und optional DE-Feiertage); gleiche Logik wie Eligibility (ADR-0011 B3).
        openAmountCents:
          type: integer
          minimum: 1
        lastDunningStageOrdinal:
          type: integer
          minimum: 1
          maximum: 9
          description: Höchste bisher protokollierte Mahnstufe; fehlt, wenn noch kein Mahn-Ereignis.
    DunningReminderCandidatesReadData:
      type: object
      required: [configSource, asOfDate, stageOrdinal, daysAfterDueForStage, eligibilityContext, candidates]
      properties:
        configSource:
          type: string
          enum: [MVP_STATIC_DEFAULTS, TENANT_DATABASE]
        asOfDate:
          type: string
          format: date
        stageOrdinal:
          type: integer
          minimum: 1
          maximum: 9
        daysAfterDueForStage:
          type: integer
          minimum: 0
          maximum: 3650
        eligibilityContext:
          $ref: '#/components/schemas/DunningCandidatesEligibilityContextRead'
        candidates:
          type: array
          items:
            $ref: '#/components/schemas/DunningReminderCandidateRow'
    DunningReminderCandidatesReadResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/DunningReminderCandidatesReadData'
    DunningReminderRunRequest:
      type: object
      required: [stageOrdinal, reason, mode]
      properties:
        stageOrdinal:
          type: integer
          minimum: 1
          maximum: 9
        reason:
          type: string
          minLength: 5
          maxLength: 500
        mode:
          type: string
          enum: [DRY_RUN, EXECUTE]
        asOfDate:
          type: string
          format: date
          description: ISO `yyyy-mm-dd` wie GET Kandidaten (Kalendertag in Mandanten-IANA-Zeitzone aus Automation); ohne Angabe = heute in dieser Zone (ADR-0011).
        invoiceIds:
          type: array
          maxItems: 500
          items:
            type: string
            format: uuid
          description: Optional; Teilmenge der Kandidaten. Fehlt oder leer → alle Kandidaten der Stufe.
        note:
          type: string
          maxLength: 500
          description: Optional; wird an `POST …/dunning-reminders` pro Rechnung durchgereicht.
    DunningReminderRunPlannedRow:
      type: object
