  /finance/dunning-reminder-run:
    post:
      tags: [Finance (FIN-4)]
      operationId: finDunningReminderRunPost
      summary: Mahnlauf (Vorschau oder Batch, M4 Slice 5b-1)
      description: |
        **M4 Slice 5b-1:** `DRY_RUN` — gleiche Eligibility wie `GET /finance/dunning-reminder-candidates`, Antwort mit `planned` (keine Mutation, Leserolle).
        `EXECUTE` — protokolliert Mahn-Ereignisse wie `POST /invoices/{invoiceId}/dunning-reminders` für jede Zielrechnung; Header **`Idempotency-Key`** (UUID) **Pflicht**; Canonical-Fingerprint aus `stageOrdinal`, `asOfDate`, optional sortierte `invoiceIds` (sonst alle Kandidaten).
        Wiederholung mit gleichem Key und gleichem Fingerprint → **200** mit `outcome: REPLAY` und gespeichertem Ergebnis; anderer Fingerprint bei gleichem Key → **400** `DUNNING_RUN_IDEMPOTENCY_MISMATCH`.
        **Mandant `runMode` OFF** (`GET|PATCH /finance/dunning-reminder-automation`): beide Modi **DRY_RUN** und **EXECUTE** → **409** `DUNNING_REMINDER_RUN_DISABLED` (Lesepfad Kandidaten/Automation unverändert; ADR-0011).
        Persistenz der Absicht: Postgres `dunning_reminder_run_intents`; In-Memory-Modus prozesslokal.
        ADR: `docs/adr/0010-fin4-m4-dunning-email-and-templates.md`.
      security:
        - bearerToken: []
      parameters:
        - $ref: '#/components/parameters/TenantScopeHeader'
        - in: header
          name: Idempotency-Key
          required: false
          schema:
            type: string
            format: uuid
          description: |
            Bei JSON-Feld **mode** = **EXECUTE** ist der Header **Pflicht** (UUID, case-insensitive); bei **DRY_RUN** optional bzw. ignoriert.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DunningReminderRunRequest'
      responses:
        '200':
          description: Vorschau, erfolgreicher Lauf oder Idempotenz-Replay
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DunningReminderRunResponse'
        '400':
          description: VALIDATION_FAILED | DUNNING_RUN_STAGE_INVALID | DUNNING_RUN_INVOICES_INVALID | DUNNING_RUN_IDEMPOTENCY_MISMATCH
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: AUTH_ROLE_FORBIDDEN | TENANT_SCOPE_VIOLATION
        '401':
          description: UNAUTHORIZED
        '409':
          description: DUNNING_RUN_CONFIG_INCOMPLETE | DUNNING_REMINDER_RUN_DISABLED
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /finance/dunning-reminder-run/send-emails:
    post:
      tags: [Finance (FIN-4)]
      operationId: finDunningReminderBatchEmailPost
      summary: Batch-Mahn-E-Mail je Rechnung (M4 Slice 5c, 5a pro Zeile)
      description: |
        **M4 Slice 5c:** SMTP-Versand fuer mehrere Kandidaten-Rechnungen derselben Stufe; **wiederholt** die Pipeline von `POST /invoices/{invoiceId}/dunning-reminders/send-email` (Slice 5a) — **explizites** `toEmail` und **eigener** `Idempotency-Key` pro Zeile.
        **DRY_RUN:** Leserolle; pro Zeile Vorschau/Footer-Gate ohne SMTP. **EXECUTE:** Schreibrolle; `confirmBatchSend: true` Pflicht; sequentieller Versand; Teilfehler in `results[]` ohne Rollback bereits gesendeter Mails.
        Bei Mandanten-**runMode OFF**: **409** `DUNNING_REMINDER_RUN_DISABLED`. Max. **25** Zeilen. Spec: `docs/tickets/M4-BATCH-DUNNING-EMAIL-SPEC.md`.
      security:
        - bearerToken: []
      parameters:
        - $ref: '#/components/parameters/TenantScopeHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DunningReminderBatchEmailRequest'
      responses:
        '200':
          description: Dry-Run-Ergebnis oder Batch-Versand-Ergebnis je Zeile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DunningReminderBatchEmailResponse'
        '400':
          description: VALIDATION_FAILED | DUNNING_RUN_INVOICES_INVALID | DUNNING_BATCH_EMAIL_CONFIRM_REQUIRED | DUNNING_BATCH_EMAIL_DUPLICATE_INVOICE_ID | DUNNING_BATCH_EMAIL_DUPLICATE_IDEMPOTENCY_KEY | DUNNING_BATCH_EMAIL_TOO_MANY_ITEMS | DUNNING_EMAIL_* 
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: AUTH_ROLE_FORBIDDEN | TENANT_SCOPE_VIOLATION
        '401':
          description: UNAUTHORIZED
        '409':
          description: DUNNING_REMINDER_RUN_DISABLED
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '502':
          description: DUNNING_EMAIL_SMTP_ERROR (bei EXECUTE, Zeilenfehler auch in results)
        '503':
          description: DUNNING_EMAIL_SMTP_NOT_CONFIGURED

