openapi: 3.0.3
info:
  title: ERP Backend API (Phase 1 + Phase 2 Inc1 + Inc2 LV §9 + FIN-0 Finance Stubs)
  version: 1.7.0-password-reset
  description: |
    **PWA / Browser-Anbindung**
    - **CORS**: Umgebungsvariable `CORS_ORIGINS` — kommagetrennte, exakte Origins (z. B. `https://app.example.com,http://localhost:5173`). Leer oder unset: keine `Access-Control-*`-Header (gleiche Origin oder Server-zu-Server).
    - **Auth**: `Authorization: Bearer <signed-v1-token>` (siehe `bearerToken`); optionaler Header `X-Tenant-Id` muss zum Tenant im Token passen, sonst `TENANT_SCOPE_VIOLATION`. **Passwort-Login:** `POST /auth/login` mit JSON `{ tenantId, email, password }` — siehe `docs/authentication-login.md`. **Passwort vergessen (öffentlich):** `POST /auth/request-password-reset`, `POST /auth/confirm-password-reset` — nur mit Postgres; Link `#/password-reset?token=…` (Basis `ERP_PUBLIC_APP_BASE_URL`); Produktion: SMTP + Basis-URL Pflicht. **Benutzerverwaltung:** `GET|POST /users`, `PATCH /users/{userId}` inkl. optional **E-Mail** (nur Rolle **ADMIN**, nur mit Postgres) — Audit-Ereignisse `USER` / `USER_CREATED` / `USER_UPDATED`. **Betrieb:** `AUTH_TOKEN_SECRET` (min. 32 Zeichen bei `NODE_ENV=production`); ohne Secret kein Start — siehe Repo-`.env.example`. Nur lokaler Demo-Modus: `ERP_ALLOW_INSECURE_DEV_AUTH=1` und nicht `production` (niemals deployen).
    - **Logs**: Strukturierte Fastify-Request-Logs enthalten keine `Authorization`- oder `Cookie`-Werte (`LOG_LEVEL`, `LOG_DISABLE=1` siehe Betrieb).
    - **Fehler**: Antwort-JSON gemäß Schema `Error` — Felder `code`, `message`, `correlationId`, `retryable`, `blocking`, optional `details` (Frontend-Passthrough laut `docs/contracts/decision-log-phase1-frontend.md`). **Header:** `x-correlation-id` und `x-request-id` sind gleich der Request-ID (`request.id`) und entsprechen `correlationId` im Body bei Fehlerantworten.
servers:
  - url: http://localhost:3000
tags:
  - name: Auth
    description: |
      Passwort-Anmeldung (`POST /auth/login`) und öffentlicher Passwort-Reset per E-Mail (`POST /auth/request-password-reset`, `POST /auth/confirm-password-reset`, nur Postgres).
      Ohne Postgres: In-Memory-Login optional über `ERP_LOGIN_*`; Reset-Endpunkte antworten mit `503` / `USER_MANAGEMENT_REQUIRES_DB`.
  - name: Users (Admin)
    description: |
      Mandanten-isolierte Benutzerverwaltung (Tabelle `users`). Schreibzugriff nur mit Rolle **ADMIN**; ohne Postgres antwortet die API mit `503` / `USER_MANAGEMENT_REQUIRES_DB`.
  - name: Finance (FIN-0)
    description: |
      OpenAPI-Skelett für FIN-1 (Zahlungsbedingungen) / FIN-2 (Rechnung) / später FIN-3 (Zahlungseingang).
      **FIN-2 Implementation out of scope** bis `docs/tickets/FIN-2-START-GATE.md` erfüllt; Fail-closed-Mapping: `docs/contracts/finance-fin0-openapi-mapping.md`.
components:
  securitySchemes:
    bearerToken:
      type: http
      scheme: bearer
      bearerFormat: signed-v1-token
  parameters:
    TenantScopeHeader:
      in: header
      name: x-tenant-id
      required: false
      schema:
        type: string
        format: uuid
      description: Optionaler Tenant-Scope, muss mit Token-Tenant identisch sein.
    IdempotencyKey:
      in: header
      name: Idempotency-Key
      required: true
      schema:
        type: string
        format: uuid
      description: |
        Pflicht für Zahlungseingang (8.7) sobald Endpunkt produktiv; technische Eindeutigkeit `(tenant_id, idempotency_key)` gemäß ADR-0007.
        FIN-0 dokumentiert nur den Contract — kein produktiver Buchungsweg.
        FIN-0-Backend: Header wird **case-insensitive** gelesen (HTTP-Üblichkeit); Wert muss **UUID** sein, sonst `400` / `VALIDATION_FAILED`.
  schemas:
    AllowedActionsResponse:
      type: object
      required: [documentId, entityType, allowedActions]
      properties:
        documentId:
          type: string
          format: uuid
        entityType:
          type: string
          enum: [OFFER_VERSION, SUPPLEMENT_VERSION, MEASUREMENT_VERSION, LV_VERSION, LV_STRUCTURE_NODE, LV_POSITION, INVOICE]
        allowedActions:
          type: array
          items:
            type: string
          description: |
            Backend Source-of-Truth. Für entityType=OFFER_VERSION und status=ANGENOMMEN können berechtigte Rollen
            (ADMIN, VERTRIEB, GESCHAEFTSFUEHRUNG) die Aktion OFFER_CREATE_SUPPLEMENT erhalten (Mapping zu POST /offers/{offerId}/supplements).
            OFFER_CREATE_VERSION endet spätestens vor ANGENOMMEN/ABGELEHNT/ARCHIVIERT (Policy offer-create-version-policy).
            entityType=MEASUREMENT_VERSION: Aktionen gemäß §5.4 v1.2 (z. B. MEASUREMENT_CREATE_VERSION nur nach FREIGEGEBEN/ABGERECHNET;
            historische Versionen: leere allowedActions).
            entityType=LV_VERSION|LV_STRUCTURE_NODE|LV_POSITION: gemäß §9 v1.2 und ADR-0005 (Text/Struktur nur ENTWURF aktuelle Version).
            entityType=INVOICE: kanonische Export-Aktion **EXPORT_INVOICE** (Format `XRECHNUNG` nur im Body von POST /exports); kein separates actionId-Suffix pro Format.
    MeasurementPosition:
      type: object
      required: [lvPositionId, quantity, unit]
      properties:
        lvPositionId:
          type: string
          format: uuid
        quantity:
          type: number
          exclusiveMinimum: 0
        unit:
          type: string
          maxLength: 32
        note:
          type: string
          maxLength: 500
    CreateMeasurementRequest:
      type: object
      required: [projectId, customerId, lvVersionId, positions, reason]
      properties:
        projectId:
          type: string
          format: uuid
        customerId:
          type: string
          format: uuid
        lvVersionId:
          type: string
          format: uuid
        positions:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/MeasurementPosition'
        reason:
          type: string
          minLength: 5
    TransitionMeasurementStatusRequest:
      type: object
      required: [measurementVersionId, nextStatus, reason]
      properties:
        measurementVersionId:
          type: string
          format: uuid
        nextStatus:
          type: string
          enum: [GEPRUEFT, FREIGEGEBEN, ABGERECHNET, ARCHIVIERT]
        reason:
          type: string
          minLength: 5
    CreateMeasurementVersionRequest:
      type: object
      required: [measurementId, reason]
      properties:
        measurementId:
          type: string
          format: uuid
        reason:
          type: string
          minLength: 5
    UpdateMeasurementPositionsRequest:
      type: object
      required: [positions, reason]
      properties:
        positions:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/MeasurementPosition'
        reason:
          type: string
          minLength: 5
    CreateLvCatalogRequest:
      type: object
      required: [name, headerSystemText, headerEditingText, reason]
      properties:
        name:
          type: string
          maxLength: 200
        headerSystemText:
          type: string
        headerEditingText:
          type: string
        projectId:
          type: string
          format: uuid
        reason:
          type: string
          minLength: 5
    CreateLvCatalogVersionRequest:
      type: object
      required: [reason]
      properties:
        reason:
          type: string
          minLength: 5
    TransitionLvVersionRequest:
      type: object
      required: [nextStatus, reason]
      properties:
        nextStatus:
          type: string
          enum: [FREIGEGEBEN, ARCHIVIERT]
        reason:
          type: string
          minLength: 5
    AddLvStructureNodeRequest:
      type: object
      required: [kind, sortOrdinal, systemText, editingText, reason]
      properties:
        parentNodeId:
          type: string
          format: uuid
          nullable: true
        kind:
          type: string
          enum: [BEREICH, TITEL, UNTERTITEL]
        sortOrdinal:
          type: string
        systemText:
          type: string
        editingText:
          type: string
        reason:
          type: string
          minLength: 5
    UpdateLvNodeEditingRequest:
      type: object
      required: [editingText, reason]
      properties:
        editingText:
          type: string
        reason:
          type: string
          minLength: 5
    AddLvPositionRequest:
      type: object
      required: [parentNodeId, sortOrdinal, quantity, unit, unitPriceCents, kind, systemText, editingText, reason]
      properties:
        parentNodeId:
          type: string
          format: uuid
        sortOrdinal:
          type: string
        quantity:
          type: number
        unit:
          type: string
        unitPriceCents:
          type: integer
        kind:
          type: string
          enum: [NORMAL, ALTERNATIV, EVENTUAL]
        systemText:
          type: string
        editingText:
          type: string
        stammPositionsRef:
          type: string
          format: uuid
        reason:
          type: string
          minLength: 5
    PatchLvPositionRequest:
      type: object
      required: [reason]
      properties:
        editingText:
          type: string
        quantity:
          type: number
        unit:
          type: string
        unitPriceCents:
          type: integer
        sortOrdinal:
          type: string
        reason:
          type: string
          minLength: 5
    CreatePaymentTermsVersionRequest:
      type: object
      description: |
        Platzhalter FIN-1 — Zahlungsbedingungs-Version (v1.3 **8.5**). Felder können im FIN-2-Kick-off verfeinert werden;
        **kein** `default` für Geldbeträge oder Währung (8.12 / 8.16).
      required: [projectId, customerId, reason, termsLabel]
      properties:
        projectId:
          type: string
          format: uuid
        customerId:
          type: string
          format: uuid
        termsLabel:
          type: string
          maxLength: 200
          description: Mandantensichtbare Bezeichnung der Konditionsversion (kein Freitext-Skript).
        reason:
          type: string
          minLength: 5
    CreateInvoiceDraftRequest:
      type: object
      description: |
        Platzhalter FIN-2 — Rechnung als Entwurf (**8.2**). `lvVersionId` verbindliche Bezugsgröße für **8.4 Schritt 1** (FIN-2-Start-Gate **G5**).
        `invoiceCurrencyCode` explizit required; v1.3 buchführungsrelevant nur **EUR** — **ohne** OpenAPI-Default.
      required: [lvVersionId, offerVersionId, invoiceCurrencyCode, reason]
      properties:
        lvVersionId:
          type: string
          format: uuid
        offerVersionId:
          type: string
          format: uuid
        invoiceCurrencyCode:
          type: string
          enum: [EUR]
        reason:
          type: string
          minLength: 5
    PaymentIntakeRequest:
      type: object
      description: Platzhalter FIN-3 / Anbindung **8.7** — Zahlungseingang (ohne produktive Buchung in FIN-0).
      required: [invoiceId, amountCents, externalReference, reason]
      properties:
        invoiceId:
          type: string
          format: uuid
        amountCents:
          type: integer
          description: Geldbetrag in Cent; Rundungslogik **8.12** ausschließlich serverseitig nach ADR-0007 (nicht im FIN-0-Backend implementiert).
          minimum: 1
        externalReference:
          type: string
          maxLength: 200
          description: Externer Bank-/PSP-Referenztext (DSGVO-minimierte Speicherung später im Implementierungs-PR).
        reason:
          type: string
          minLength: 5
    Error:
      type: object
      required: [code, message, correlationId, retryable, blocking]
      properties:
        code:
          type: string
          description: DomainError-Code oder VALIDATION_FAILED (siehe docs/contracts/error-codes.json).
        message:
          type: string
        correlationId:
          type: string
          format: uuid
          description: Pro Antwort von handleError generiert (Phase 1).
        retryable:
          type: boolean
        blocking:
          type: boolean
        details:
          type: object
          additionalProperties: true
          description: Optional, z. B. validationErrors bei EXPORT_PREFLIGHT_FAILED.
    ExportRequest:
      type: object
      required: [entityType, entityId, format]
      properties:
        entityType:
          type: string
          enum: [OFFER_VERSION, SUPPLEMENT_VERSION, INVOICE]
        entityId:
          type: string
          format: uuid
        format:
          type: string
          enum: [XRECHNUNG, GAEB]
    TenantUser:
      type: object
      required: [id, email, role, active, createdAt]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        role:
          type: string
          enum: [ADMIN, BUCHHALTUNG, GESCHAEFTSFUEHRUNG, VERTRIEB, VIEWER]
        active:
          type: boolean
        createdAt:
          type: string
          format: date-time
    TenantUserListResponse:
      type: object
      required: [users]
      properties:
        users:
          type: array
          items:
            $ref: '#/components/schemas/TenantUser'
    CreateTenantUserRequest:
      type: object
      required: [email, password, role, reason]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 12
          maxLength: 2000
        role:
          type: string
          enum: [ADMIN, BUCHHALTUNG, GESCHAEFTSFUEHRUNG, VERTRIEB, VIEWER]
        reason:
          type: string
          minLength: 5
    PatchTenantUserRequest:
      type: object
      required: [reason]
      properties:
        role:
          type: string
          enum: [ADMIN, BUCHHALTUNG, GESCHAEFTSFUEHRUNG, VERTRIEB, VIEWER]
        active:
          type: boolean
        password:
          type: string
          minLength: 12
          maxLength: 2000
        email:
          type: string
          format: email
          description: Neue E-Mail (normalisiert wie bei Login); mindestens ein Feld neben reason erforderlich.
        reason:
          type: string
          minLength: 5
    RequestPasswordResetRequest:
      type: object
      required: [tenantId, email]
      properties:
        tenantId:
          type: string
          format: uuid
        email:
          type: string
          format: email
    RequestPasswordResetResponse:
      type: object
      required: [ok, message]
      properties:
        ok:
          type: boolean
          enum: [true]
        message:
          type: string
          description: Generische Bestätigung ohne Enumeration (ob Konto existiert).
    ConfirmPasswordResetRequest:
      type: object
      required: [token, password]
      properties:
        token:
          type: string
          minLength: 20
          maxLength: 500
        password:
          type: string
          minLength: 12
          maxLength: 2000
    ConfirmPasswordResetResponse:
      type: object
      required: [ok]
      properties:
        ok:
          type: boolean
          enum: [true]
    LoginRequest:
      type: object
      required: [tenantId, email, password]
      properties:
        tenantId:
          type: string
          format: uuid
          description: Mandanten-ID — Login nur für Benutzer dieses Tenants (strict tenant scope).
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 1
          maxLength: 2000
    LoginResponse:
      type: object
      required: [accessToken, tokenType, expiresIn, tenantId, userId, role]
      properties:
        accessToken:
          type: string
          description: Signiertes v1-Token (unmittelbar als Bearer-Authorization nutzbar).
        tokenType:
          type: string
          enum: [Bearer]
        expiresIn:
          type: integer
          minimum: 1
          description: Restliche Gültigkeit in Sekunden ab Ausstellung.
        tenantId:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        role:
          type: string
          enum: [ADMIN, BUCHHALTUNG, GESCHAEFTSFUEHRUNG, VERTRIEB, VIEWER]
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [ok]
paths:
  /health:
    get:
      summary: Liveness (tenant-neutral, ohne Auth)
      description: Minimaler Endpunkt für Load-Balancer/Orchestrierung; keine Mandantendaten.
      responses:
        '200':
          description: Prozess antwortet
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'
  /auth/login:
    post:
      tags: [Auth]
      operationId: authPasswordLogin
      summary: Passwort-Anmeldung (MVP / Demo-Betrieb)
      description: |
        Prüft **Mandant + E-Mail + Passwort**. Mit Postgres: Benutzer aus Tabelle `users` (Multi-User pro Mandant).
        Ohne Postgres (In-Memory-Modus): optional `ERP_LOGIN_*` siehe `docs/authentication-login.md`.
        Kein OAuth2. Fehlversuche: einheitliche `401` / `UNAUTHORIZED` ohne Enumeration.
        Brute-Force-Schutz: IP-basiertes Fenster (siehe Doku).
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Ausgestelltes Session-Token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          description: VALIDATION_FAILED (Zod)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: UNAUTHORIZED (falsche Zugangsdaten oder Login deaktiviert)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          description: AUTH_RATE_LIMITED
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /auth/request-password-reset:
    post:
      tags: [Auth]
      operationId: authRequestPasswordReset
      summary: Passwort-Reset anfordern (E-Mail mit Link)
      description: |
        Öffentlich, ohne Bearer. Mit Postgres; erzeugt Challenge und sendet E-Mail (Dev/Test ohne SMTP ggf. Konsolen-Fallback).
        In **production** ohne SMTP oder ohne `ERP_PUBLIC_APP_BASE_URL`: **503** / `PASSWORD_RESET_MAIL_NOT_CONFIGURED` vor Benutzer-Lookup.
        Antwort-Text bleibt generisch (keine Enumeration existierender Konten).
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RequestPasswordResetRequest'
      responses:
        '200':
          description: Anfrage entgegengenommen
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestPasswordResetResponse'
        '400':
          description: VALIDATION_FAILED
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          description: AUTH_RATE_LIMITED
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '503':
          description: USER_MANAGEMENT_REQUIRES_DB | PASSWORD_RESET_MAIL_NOT_CONFIGURED
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /auth/confirm-password-reset:
    post:
      tags: [Auth]
      operationId: authConfirmPasswordReset
      summary: Neues Passwort mit Token aus E-Mail-Link setzen
      description: Öffentlich, ohne Bearer. Token einmalig, TTL ca. 1 Stunde.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConfirmPasswordResetRequest'
      responses:
        '200':
          description: Passwort aktualisiert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfirmPasswordResetResponse'
        '400':
          description: VALIDATION_FAILED | PASSWORD_RESET_INVALID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          description: AUTH_RATE_LIMITED
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '503':
          description: USER_MANAGEMENT_REQUIRES_DB
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /users:
    get:
      tags: [Users (Admin)]
      operationId: tenantUsersList
      summary: Benutzer des Mandanten auflisten
      description: Nur **ADMIN**. Ohne Postgres `503` / `USER_MANAGEMENT_REQUIRES_DB`.
      security:
        - bearerToken: []
      parameters:
        - $ref: '#/components/parameters/TenantScopeHeader'
      responses:
        '200':
          description: Liste ohne Passwort-Hashes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantUserListResponse'
        '400':
          description: VALIDATION_FAILED
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: AUTH_ROLE_FORBIDDEN
        '401':
          description: UNAUTHORIZED
        '503':
          description: USER_MANAGEMENT_REQUIRES_DB
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      tags: [Users (Admin)]
      operationId: tenantUserCreate
      summary: Benutzer anlegen
      description: Nur **ADMIN**; E-Mail mandantenweit eindeutig. Audit `USER_CREATED`.
      security:
        - bearerToken: []
      parameters:
        - $ref: '#/components/parameters/TenantScopeHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTenantUserRequest'
      responses:
        '201':
          description: Angelegter Benutzer
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantUser'
        '400':
          description: VALIDATION_FAILED
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: AUTH_ROLE_FORBIDDEN
        '401':
          description: UNAUTHORIZED
        '409':
          description: USER_EMAIL_CONFLICT
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '503':
          description: USER_MANAGEMENT_REQUIRES_DB
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /users/{userId}:
    patch:
      tags: [Users (Admin)]
      operationId: tenantUserPatch
      summary: Benutzer aktualisieren (Rolle, aktiv, Passwort)
      description: |
        Nur **ADMIN**. Mindestens eines von `role`, `active`, `password` erforderlich (plus `reason`).
        Schutz letzter aktiver Admin und kein Deaktivieren des eigenen Kontos. Audit `USER_UPDATED`.
      security:
        - bearerToken: []
      parameters:
        - $ref: '#/components/parameters/TenantScopeHeader'
        - in: path
          name: userId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchTenantUserRequest'
      responses:
        '200':
          description: Aktualisierter Benutzer
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantUser'
        '400':
          description: VALIDATION_FAILED
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: AUTH_ROLE_FORBIDDEN
        '401':
          description: UNAUTHORIZED
        '404':
          description: USER_NOT_FOUND
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: USER_EMAIL_CONFLICT | USER_LAST_ADMIN_FORBIDDEN | USER_SELF_DEACTIVATION_FORBIDDEN
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '503':
          description: USER_MANAGEMENT_REQUIRES_DB
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /lv/catalogs:
    post:
      description: Neuer LV-Katalog mit erster Version (ENTWURF) und Minimal-Skelett §9.
      security:
        - bearerToken: []
      parameters:
        - $ref: '#/components/parameters/TenantScopeHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateLvCatalogRequest'
      responses:
        '201':
          description: lvCatalogId, lvVersionId, samplePositionId
        '403':
