                    entityType: OFFER_VERSION
                    allowedActions: ["OFFER_CREATE_SUPPLEMENT"]
        '403':
          description: TENANT_SCOPE_VIOLATION
        '404':
          description: DOCUMENT_NOT_FOUND
        '401':
          description: Authentifizierung fehlgeschlagen
