        - in: path
          name: invoiceId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DunningReminderEmailSendRequest'
      responses:
        '200':
          description: Versand erfolgreich oder Idempotenz-Replay
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DunningReminderEmailSendResponse'
        '400':
          description: VALIDATION_FAILED | DUNNING_EMAIL_FOOTER_NOT_READY | DUNNING_EMAIL_STAGE_INVALID | DUNNING_EMAIL_IDEMPOTENCY_MISMATCH
