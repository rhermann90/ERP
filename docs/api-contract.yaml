      summary: Mahnlauf-Kandidaten lesen (M4 Slice 5b-0)
      description: |
        **M4 Slice 5b-0:** Ermittelt Rechnungen, die für **eine** gewählte Mahnstufe (`stageOrdinal`) zum Referenzdatum `asOfDate` (Default „heute“ in der Mandanten-IANA-Zeitzone aus Automation, `yyyy-mm-dd`) fällig sind — **ohne** Mutation und **ohne** E-Mail.
        Eligibility und Fälligkeitsanker (`dueDate` im Payload = `issueDate` im MVP) siehe ADR-0010 und ADR-0011 (Slice 5b).
        Gleiche Leserolle wie Vorlagen (`assertCanReadInvoice`).
