      summary: Rechnung buchen (ENTWURF → GEBUCHT_VERSENDET)
      description: |
        Verbindliche Rechnungsnummer je Mandant; Traceability fail-closed. Kein erneutes Buchen bei anderem Status (**409** `INVOICE_NOT_BOOKABLE`).
        Doppelte Nummer unter Last (**409** `INVOICE_NUMBER_CONFLICT`). Entwurf ohne Beträge (**422** `INVOICE_DRAFT_INCOMPLETE`).
        **SoT (Shell):** Aktion **BOOK_INVOICE** in `GET /documents/{invoiceId}/allowed-actions?entityType=INVOICE` für Status **ENTWURF** und Rollen ADMIN, GESCHAEFTSFUEHRUNG, BUCHHALTUNG — siehe `docs/contracts/action-contracts.json`.
      security:
        - bearerToken: []
      parameters:
        - $ref: '#/components/parameters/TenantScopeHeader'
        - in: path
          name: invoiceId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BookInvoiceRequest'
      responses:
        '200':
          description: Gebuchte Rechnung
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookInvoiceResponse'
        '400':
          description: VALIDATION_FAILED
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: DOCUMENT_NOT_FOUND
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: INVOICE_NOT_BOOKABLE | INVOICE_NUMBER_CONFLICT
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: TRACEABILITY_* | INVOICE_DRAFT_INCOMPLETE
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: AUTH_ROLE_FORBIDDEN | TENANT_SCOPE_VIOLATION
        '401':
          description: UNAUTHORIZED
  /finance/payments/intake:
    post:
      tags: [Finance (FIN-3)]
      operationId: finPaymentIntakeCreate
      summary: Zahlungseingang (8.7) inkl. Idempotency-Key
      description: |
        Persistierter Zahlungseingang: Idempotenz `(tenant_id, idempotency_key)`; bei gleichem Key und gleichem `invoiceId`/`amountCents` liefert die API **200** mit identischem Erfolgskörper (Replay).
        Rechnung muss **GEBUCHT_VERSENDET** oder **TEILBEZAHLT** sein und 8.4-Beträge (`totalGrossCents` u. a.) tragen; sonst Domain-Fehlercodes siehe **400**-Antworten.
      security:
        - bearerToken: []
      parameters:
        - $ref: '#/components/parameters/TenantScopeHeader'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentIntakeRequest'
      responses:
        '201':
          description: Neuer Zahlungseingang gespeichert; Rechnungsstatus ggf. auf TEILBEZAHLT oder BEZAHLT.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentIntakeResponse'
        '200':
          description: Idempotenter Replay — gleicher `Idempotency-Key` und gleicher fachlicher Inhalt wie die erste erfolgreiche Antwort.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentIntakeResponse'
        '404':
          description: DOCUMENT_NOT_FOUND — Rechnung unbekannt oder nicht im Mandanten.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '400':
          description: |
            VALIDATION_FAILED (Zod) |
            PAYMENT_INTAKE_IDEMPOTENCY_MISMATCH |
            PAYMENT_INVOICE_NOT_PAYABLE |
            PAYMENT_INVOICE_AMOUNT_MISSING |
            PAYMENT_EXCEEDS_OPEN_AMOUNT
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: AUTH_ROLE_FORBIDDEN | TENANT_SCOPE_VIOLATION
        '401':
          description: UNAUTHORIZED
