          type: string
          format: date
        results:
          type: array
          items:
            $ref: '#/components/schemas/DunningReminderBatchEmailRowResult'
    DunningReminderBatchEmailResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/DunningReminderBatchEmailResponseData'

    PutDunningReminderConfigRequest:
      type: object
      required: [stages, reason]
      properties:
        stages:
          type: array
          minItems: 9
          maxItems: 9
          items:
            $ref: '#/components/schemas/DunningStageConfigReadRow'
        reason:
          type: string
          minLength: 5
          maxLength: 500
    PatchDunningReminderStageRequest:
      type: object
      required: [reason]
