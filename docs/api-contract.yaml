        Für §9 LV: `id` ist jeweils die Entitäts-ID passend zu `entityType` (LV_VERSION → lvVersionId, LV_STRUCTURE_NODE → nodeId, LV_POSITION → positionId); siehe ADR-0005.
      security:
        - bearerToken: []
      parameters:
        - $ref: '#/components/parameters/TenantScopeHeader'
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
        - in: query
          name: entityType
          required: true
          schema:
            type: string
            enum:
