      properties:
        invoiceId:
          type: string
          format: uuid
        dunningReminderId:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        stageOrdinal:
          type: integer
          minimum: 1
          maximum: 9
    DunningReminderRunResponseData:
      type: object
      required: [mode, stageOrdinal, asOfDate, configSource]
      properties:
        mode:
          type: string
          enum: [DRY_RUN, EXECUTE]
        outcome:
          type: string
          enum: [PREVIEW, COMPLETED, REPLAY]
        stageOrdinal:
          type: integer
          minimum: 1
          maximum: 9
        asOfDate:
          type: string
          format: date
        configSource:
          type: string
          enum: [MVP_STATIC_DEFAULTS, TENANT_DATABASE]
        planned:
          type: array
