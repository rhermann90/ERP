      description: |
        Plain-Text wie `email-preview`; prüft `readyForEmailFooter`. **SMTP** über `ERP_SMTP_*` (siehe Betriebsdoku).
        **Idempotenz:** Header `Idempotency-Key` (UUID); gleicher Key + gleiche fachliche Parameter → `outcome: REPLAY` ohne zweiten Versand.
        Schreibrolle wie `POST …/dunning-reminders` / Stub (`RECORD_DUNNING_REMINDER`).
        Der Endpunkt `send-email-stub` (Slice 4) bleibt für Demos ohne SMTP parallel.
        ADR: `docs/adr/0010-fin4-m4-dunning-email-and-templates.md`.
      security:
        - bearerToken: []
      parameters:
        - $ref: '#/components/parameters/TenantScopeHeader'
