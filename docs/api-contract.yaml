        executed:
          type: array
          items:
            $ref: '#/components/schemas/DunningReminderRunExecutedRow'
    DunningReminderRunResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/DunningReminderRunResponseData'
    DunningReminderBatchEmailItem:
      type: object
      required: [invoiceId, toEmail]
      properties:
        invoiceId:
          type: string
          format: uuid
        toEmail:
          type: string
          format: email
          maxLength: 320
        idempotencyKey:
          type: string
          format: uuid
