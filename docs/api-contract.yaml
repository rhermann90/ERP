      properties:
        invoiceId:
          type: string
          format: uuid
        dueDate:
          type: string
          format: date
        stageDeadlineIso:
          type: string
          format: date
          description: Wie Kandidaten-API `stageDeadlineIso` (Stufenfristende).
        openAmountCents:
          type: integer
          minimum: 1
        wouldRecordStageOrdinal:
          type: integer
          minimum: 1
          maximum: 9
    DunningReminderRunExecutedRow:
