  /documents/{id}/allowed-actions:
    get:
      description: |
        Liefert erlaubte actionIds für das Dokument (Backend-SoT). Kein separates entityType=OFFER in Phase 1.
        Beispiel nach Annahme: bei OFFER_VERSION im Status ANGENOMMEN erscheint für ADMIN/VERTRIEB/GESCHAEFTSFUEHRUNG
        OFFER_CREATE_SUPPLEMENT (nicht OFFER_CREATE_VERSION).
        Für §9 LV: `id` ist jeweils die Entitäts-ID passend zu `entityType` (LV_VERSION → lvVersionId, LV_STRUCTURE_NODE → nodeId, LV_POSITION → positionId); siehe ADR-0005.
      security:
        - bearerToken: []
      parameters:
        - $ref: '#/components/parameters/TenantScopeHeader'
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
        - in: query
          name: entityType
          required: true
          schema:
            type: string
            enum:
              - OFFER_VERSION
              - SUPPLEMENT_VERSION
              - MEASUREMENT_VERSION
              - LV_VERSION
              - LV_STRUCTURE_NODE
              - LV_POSITION
              - INVOICE
      responses:
        '200':
          description: Erlaubte Aktionen pro Dokument als Backend-Source-of-Truth
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AllowedActionsResponse'
              examples:
