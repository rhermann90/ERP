# Pflichtjobs: typecheck, Prisma validate, Tests inkl. Persistenz (Postgres-Service, kein SKIP der DB-Suites).
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: erp
          POSTGRES_PASSWORD: erp
          POSTGRES_DB: erp_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U erp -d erp_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://erp:erp@localhost:5432/erp_test
      PERSISTENCE_DB_TEST_URL: postgresql://erp:erp@localhost:5432/erp_test
      NODE_ENV: test

    steps:
      # v5: Action-Laufzeit Node 24 (GitHub Deprecation Node 20 für checkout/setup-node v4)
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: npm audit (runtime, fail on high+, Phase A2)
        run: npm run audit:prod

      - name: npm audit (full tree incl. workspaces, Phase A2)
        run: npm audit --audit-level=high

      - name: Prisma migrate deploy (test DB)
        run: npx prisma migrate deploy

      - name: Prisma validate
        run: npm run prisma:validate

      - name: Validate docs/api-contract.yaml (YAML syntax)
        run: npm run validate:api-contract-yaml

      - name: Typecheck
        run: npm run typecheck

      - name: Build web (PWA shell, Phase A1)
        run: npm run build:web

      - name: Tests (apps/web workspace)
        run: npm run test -w apps/web

      - name: Tests (inkl. Persistenz, ohne SKIP)
        run: npm test

  # Rauchtest Login → Finanz (Vorbereitung). Läuft nach grünem `backend`; optional als Pflicht-Check in Branch Protection (Runbook).
  e2e-smoke:
    name: e2e-smoke
    runs-on: ubuntu-latest
    needs: backend
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium (system deps)
        run: npx playwright install chromium --with-deps

      - name: Playwright smoke (API Memory + Vite)
        run: npm run test:e2e
        env:
          CI: "true"
