# Pflichtjobs: typecheck, Prisma validate, Tests inkl. Persistenz (Postgres-Service, kein SKIP der DB-Suites).
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: erp
          POSTGRES_PASSWORD: erp
          POSTGRES_DB: erp_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U erp -d erp_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://erp:erp@localhost:5432/erp_test
      PERSISTENCE_DB_TEST_URL: postgresql://erp:erp@localhost:5432/erp_test
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prisma migrate deploy (test DB)
        run: npx prisma migrate deploy

      - name: Prisma validate
        run: npm run prisma:validate

      - name: Typecheck
        run: npm run typecheck

      - name: Tests (inkl. Persistenz, ohne SKIP)
        run: npm test
