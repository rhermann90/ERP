# PR: bekannte anfällige Dependencies gegen GitHub Advisory DB — optionaler Schutz vor Merge.
name: Dependency review

on:
  pull_request:
    branches: [main, master]

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/dependency-review-action@v4
