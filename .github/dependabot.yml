# Behutsam: wöchentliche npm-Updates, monatliche Action-Pins — PR-Limit begrenzt Rauschen.
version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      prisma:
        patterns:
          - "prisma"
          - "@prisma/*"
      dev-dependencies:
        dependency-type: development
        patterns:
          - "*"
        exclude-patterns:
          - "prisma"
          - "@prisma/*"
          # Vite-Ökosystem: nicht im wöchentlichen Sammel-PR (Peers plugin-react / vite-plugin-pwa)
          - "vite"
          - "@vitejs/plugin-react"
          - "vite-plugin-pwa"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
