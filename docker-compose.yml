# Lokale PostgreSQL für ERP (Prisma). Kein Produktions-Deployment.
# DB-Name `erp_test` wie in GitHub Actions — lokale CI-Parität: `npm run verify:ci:local-db`.
# Host-Port **15432** → Container 5432 (weniger Konflikt mit lokalem Postgres auf 5432).
# `npm run ensure:local-test-db` legt `erp_test` an, falls ein altes Volume nur noch `erp` hatte.
# Start: docker compose up -d
# Stop:  docker compose down
# Daten: benanntes Volume `erp_pg_data`
#
# ERP-API-Container (falls später ergänzt): `ERP_HTTP_HOST=0.0.0.0` und Ports `Host:Container`
# publizieren (z. B. 3000:3000). Mit `ERP_HTTP_HOST=127.0.0.1` **im Container** ist die API
# von außen oft **nicht** erreichbar — dann nur `network_mode: host` oder Bind `0.0.0.0` nutzen.
# Siehe `docs/runbooks/phase-a-network-security-checklist.md`.
services:
  postgres:
    image: postgres:16-alpine
    # Eindeutiger Name (kein Konflikt mit älterem `erp-postgres`); „ERP 2.0“ → erp-2-0-postgres
    container_name: erp-2-0-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: erp
      POSTGRES_PASSWORD: erp
      POSTGRES_DB: erp_test
    ports:
      - "15432:5432"
    volumes:
      - erp_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U erp -d erp_test"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  erp_pg_data:
